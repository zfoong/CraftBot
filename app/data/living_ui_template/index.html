<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{PROJECT_NAME}}</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- Backend URL: uses same hostname as the page + backend port.
         Works on localhost (CraftBot iframe) and LAN (other devices). -->
    <script>
      window.__CRAFTBOT_BACKEND_URL__ = 'http://' + window.location.hostname + ':{{BACKEND_PORT}}';
    </script>

    <!-- Console & Network capture — runs before React, survives agent rewrites -->
    <script>
    (function() {
      var BACKEND = window.__CRAFTBOT_BACKEND_URL__ || 'http://' + window.location.hostname + ':{{BACKEND_PORT}}';
      var APP_PREFIXES = ['[App','[Controller','[Service','[UI','[State','[Error','[Debug','[Main','[Component','[ApiService'];
      var NOISE = [/\[HMR\]/,/\[vite\]/,/hot update/i,/DevTools/,/Download the React/,/React does not recognize/,/Warning: Each child/,/Warning: validateDOM/,/favicon\.ico/,/net::ERR_/];
      var buffer = [];
      var timer = null;
      var orig = { log: console.log.bind(console), warn: console.warn.bind(console), error: console.error.bind(console) };
      var origFetch = window.fetch.bind(window);

      function str(a) {
        if (typeof a === 'string') return a;
        if (a instanceof Error) return a.name + ': ' + a.message + (a.stack ? '\n' + a.stack : '');
        try { var j = JSON.stringify(a); return j === '{}' ? String(a) : j; } catch(e) { return String(a); }
      }
      function args2str(a) { return Array.prototype.map.call(a, str).join(' '); }
      function isNoise(m) { return NOISE.some(function(r) { return r.test(m); }); }
      function isApp(m) { return APP_PREFIXES.some(function(p) { return m.indexOf(p) === 0; }); }

      function add(level, msg) {
        if (level !== 'network' && level !== 'error' && isNoise(msg)) return;
        if (level === 'log' && !isApp(msg)) return;
        var maxLen = level === 'error' ? 10000 : 2000;
        buffer.push({ level: level, message: msg.slice(0, maxLen), timestamp: new Date().toISOString() });
        if (buffer.length >= 20) flush();
        else if (!timer) timer = setTimeout(flush, 2000);
      }

      function flush() {
        if (timer) { clearTimeout(timer); timer = null; }
        if (!buffer.length) return;
        var entries = buffer; buffer = [];
        origFetch(BACKEND + '/api/logs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ entries: entries })
        }).catch(function() {});
      }

      // Patch console
      console.log = function() { orig.log.apply(console, arguments); add('log', args2str(arguments)); };
      console.warn = function() { orig.warn.apply(console, arguments); add('warn', args2str(arguments)); };
      console.error = function() { orig.error.apply(console, arguments); add('error', args2str(arguments)); };

      // Capture unhandled errors
      window.addEventListener('error', function(e) { add('error', 'Unhandled: ' + e.message + ' at ' + e.filename + ':' + e.lineno); });
      window.addEventListener('unhandledrejection', function(e) { add('error', 'Unhandled rejection: ' + e.reason); });

      // Intercept fetch for network logging
      window.fetch = function(input, init) {
        var method = (init && init.method) || 'GET';
        var url = typeof input === 'string' ? input : (input instanceof URL ? input.toString() : input.url);
        var reqBody = (init && init.body) ? String(init.body) : '';
        if (url.indexOf('/api/logs') !== -1) return origFetch(input, init);
        var t0 = performance.now();
        return origFetch(input, init).then(function(resp) {
          var ms = Math.round(performance.now() - t0);
          var clone = resp.clone();
          clone.text().then(function(body) {
            var isErr = resp.status >= 400;
            var trunc = function(s, n) { return s.length > n ? s.slice(0, n) + '...(truncated)' : s; };
            var parts = [method + ' ' + url + ' → ' + resp.status + ' (' + ms + 'ms)'];
            if (reqBody) parts.push('  Req: ' + (isErr ? reqBody : trunc(reqBody, 1000)));
            if (body) parts.push('  Res: ' + (isErr ? body : trunc(body, 1000)));
            add(isErr ? 'error' : 'network', parts.join('\n'));
          }).catch(function() {});
          return resp;
        }).catch(function(err) {
          var ms = Math.round(performance.now() - t0);
          var parts = [method + ' ' + url + ' → FAILED (' + ms + 'ms): ' + (err && err.message || err)];
          if (reqBody) parts.push('  Req: ' + reqBody);
          add('error', parts.join('\n'));
          throw err;
        });
      };

      window.addEventListener('beforeunload', flush);
      orig.log('[ConsoleCapture] Started — console, errors, and network requests');
    })();
    </script>

    <script type="module" src="/frontend/main.tsx"></script>
  </body>
</html>
