  - Home: index.md
  - Getting started:
      - start/index.md
      - Install: start/install.md
      - Quickstart: start/quickstart.md
      - Onboarding: start/onboarding.md
      - Your first task: start/hello-task.md
      - Service mode: start/service-mode.md
  - Concepts:
      - concepts/index.md
      - Agent loop: concepts/agent-loop.md
      - Triggers: concepts/trigger.md
      - Task sessions: concepts/task-session.md
      - Event stream: concepts/event-stream.md
      - Actions: concepts/action.md
      - Skill & action selection: concepts/skill-selection.md
      - Prompts: concepts/prompt.md
      - Context engine: concepts/context-engine.md
      - Memory: concepts/memory.md
      - Agent file system: concepts/agent-file-system.md
      - Logs: concepts/logs.md
  - Task modes:
