      - Skills overview: develop/skills/index.md
      - Write a CraftBot skill: develop/skills/craftbot-skill.md
      - External skills: develop/skills/external-skill.md
      - Custom action: develop/custom-action.md
      - Custom agent: develop/custom-agent.md
  - Configuration:
