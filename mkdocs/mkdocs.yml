      - CLI: interfaces/cli.md
      - TUI: interfaces/tui.md
      - Browser: interfaces/browser.md
      - GUI / Vision: interfaces/gui-vision.md
      - UI layer: interfaces/ui-layer.md
      - Living UI: interfaces/living-ui.md
  - Commands:
      - commands/index.md
      - Built-in commands: commands/builtin.md
      - CLI-anything: commands/cli-anything.md
  - Providers:
      - providers/index.md
      - LLM providers: providers/llm.md
      - VLM providers: providers/vlm.md
  - Connections:
      - connections/index.md
      - Credentials: connections/credentials.md
      - MCP servers: connections/mcp.md
      - Discord: connections/discord.md
      - Slack: connections/slack.md
      - Telegram (Bot): connections/telegram-bot.md
      - Telegram (User): connections/telegram-user.md
      - Notion: connections/notion.md
      - Google Workspace: connections/google-workspace.md
      - LinkedIn: connections/linkedin.md
      - Outlook: connections/outlook.md
      - WhatsApp Web: connections/whatsapp-web.md
      - WhatsApp Business: connections/whatsapp-business.md
      - GitHub: connections/github.md
      - Jira: connections/jira.md
      - Twitter: connections/twitter.md
  - Develop:
