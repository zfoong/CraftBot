<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CraftBot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <!-- Header: brand wordmark + status pill -->
    <header class="header">
      <div class="brand">
        <h1 class="brand-name">CraftBot</h1>
        <p class="brand-tag">Local AI agent · installer</p>
      </div>
      <div class="status-pill" id="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">Checking…</span>
      </div>
    </header>

    <!-- Lifecycle action buttons -->
    <section class="actions">
      <button class="btn btn-primary" id="btn-install" data-action="install">
        Install
      </button>
      <button class="btn btn-primary" id="btn-start" data-action="start">
        Start
      </button>
      <button class="btn btn-secondary" id="btn-stop" data-action="stop">
        Stop
      </button>
      <button class="btn btn-secondary" id="btn-repair" data-action="repair">
        Repair
      </button>
      <button class="btn btn-secondary" id="btn-uninstall" data-action="uninstall">
        Uninstall
      </button>
    </section>

    <!-- Utility row: links to log + browser -->
    <section class="utility">
      <button class="btn btn-ghost" id="btn-view-log">View log</button>
      <button class="btn btn-ghost" id="btn-open-browser">Open in browser</button>
    </section>

    <!-- Progress bar (hidden until a download starts) -->
    <section class="progress-section" id="progress-section" hidden>
      <div class="progress-label" id="progress-label"></div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </section>

    <!-- Output panel: streams stdout from the running action -->
    <section class="output-section">
      <h2 class="section-label">Output</h2>
      <div class="output" id="output" aria-live="polite"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
